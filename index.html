<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar Contrato</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        canvas {
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        .btn {
            background-color: #033042;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        .btn:hover {
            background-color: #021d2a;
        }

        .btn:active {
            background-color: #033042;
        }

        .clear-btn {
            background-color: #bb2819 !important;
            color: #fff;
        }

        #signature-canvas {
            width: 100%;
            height: 300px;
            border: 1px solid #333;
            border-radius: 10px;
        }

        .instructions {
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 8px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Assinar Contrato</h2>
    <p class="instructions">Copie e cole seu código de acesso e assine na área abaixo</p>

    <form id="contractForm">
        <input type="text" name="codigo" placeholder="Código de Acesso" id="codigo" required>
        <br>
    </form>

    <canvas id="signature-canvas"></canvas>
    <br>

    <button class="btn clear-btn" id="clear-btn" onclick="clearCanvas()">Limpar</button>
    <button class="btn" id="submit-btn" onclick="submitSignature()">Enviar Assinatura</button>
</div>

<script>
    const canvas = document.getElementById("signature-canvas");
    const ctx = canvas.getContext("2d");

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    canvas.width = 500;
    canvas.height = 300;

    ctx.strokeStyle = "#033042";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    function startDrawing(e) {
        e.preventDefault();
        isDrawing = true;
        lastX = e.touches ? e.touches[0].clientX - canvas.offsetLeft : e.offsetX;
        lastY = e.touches ? e.touches[0].clientY - canvas.offsetTop : e.offsetY;
    }

    function draw(e) {
        e.preventDefault();
        if (!isDrawing) return;
        const x = e.touches ? e.touches[0].clientX - canvas.offsetLeft : e.offsetX;
        const y = e.touches ? e.touches[0].clientY - canvas.offsetTop : e.offsetY;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
    }

    function stopDrawing() {
        isDrawing = false;
    }

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseout", stopDrawing);

    canvas.addEventListener("touchstart", startDrawing);
    canvas.addEventListener("touchmove", draw);
    canvas.addEventListener("touchend", stopDrawing);
    canvas.addEventListener("touchcancel", stopDrawing);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    async function submitSignature() {
        const codigo = document.getElementById('codigo').value;
        const signatureData = canvas.toDataURL("image/png");

        if (codigo.trim() === "") {
            alert("Por favor, insira seu código de acesso.");
            return;
        }

        const formData = new FormData(document.getElementById('contractForm'));
        formData.append('signature', signatureData); 
        formData.append('codigo', codigo); 

        const webhookUrl = 'https://ncimoveis.app.n8n.cloud/webhook/propostasignature';

        fetch(webhookUrl, {
            method: 'POST',
            body: formData,
        }).then(response => {
            if (response.ok) {
                alert('Documento assinado com sucesso! Enviaremos uma cópia no seu E-mail');
            }
        });
    }
</script>

</body>
</html>
