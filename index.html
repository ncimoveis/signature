<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar Contrato</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        canvas {
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        .btn {
            background-color: #033042;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        .btn:hover {
            background-color: #021d2a;
        }

        .btn:active {
            background-color: #033042;
        }

        .clear-btn {
            background-color: #bb2819;
        }

        #signature-canvas {
            width: 100%;
            height: 300px;
            border: 1px solid #333;
            border-radius: 10px;
        }

        .instructions {
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 8px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Assinar Contrato</h2>
    <p class="instructions">Preencha seu CPF e assine na área abaixo.</p>

    <!-- Campo de CPF com validação para aceitar apenas números -->
    <form id="contractForm">
        <input type="text" name="cpf" placeholder="Digite seu CPF" id="cpf" required oninput="validateCPF()">
        <br>
    </form>

    <!-- Canvas para captura de assinatura -->
    <canvas id="signature-canvas"></canvas>
    <br>

    <button class="btn clear-btn" id="clear-btn" onclick="clearCanvas()">Limpar</button>
    <button class="btn" id="submit-btn" onclick="submitSignature()">Enviar Assinatura</button>
</div>

<script>
    const canvas = document.getElementById("signature-canvas");
    const ctx = canvas.getContext("2d");

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    canvas.width = 500;
    canvas.height = 300;

    ctx.strokeStyle = "#033042";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // Inicia a assinatura
    function startDrawing(e) {
        e.preventDefault();
        isDrawing = true;
        lastX = e.touches ? e.touches[0].clientX : e.offsetX;
        lastY = e.touches ? e.touches[0].clientY : e.offsetY;
    }

    function draw(e) {
        e.preventDefault();
        if (!isDrawing) return;
        const x = e.touches ? e.touches[0].clientX : e.offsetX;
        const y = e.touches ? e.touches[0].clientY : e.offsetY;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x;
        lastY = y;
    }

    function stopDrawing() {
        isDrawing = false;
    }

    // Adicionando os eventos de toque para dispositivos móveis
    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseout", stopDrawing);

    // Eventos de toque para telas sensíveis
    canvas.addEventListener("touchstart", startDrawing);
    canvas.addEventListener("touchmove", draw);
    canvas.addEventListener("touchend", stopDrawing);
    canvas.addEventListener("touchcancel", stopDrawing);

    // Função para limpar o canvas
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Função para converter a assinatura em PNG e enviar para o webhook
    async function submitSignature() {
        const formData = new FormData(document.getElementById('contractForm'));
        const signatureData = canvas.toDataURL("image/png"); // Captura a assinatura
        const cpf = document.getElementById('cpf').value; // Pega o CPF
        formData.append('signature', signatureData); // Anexa a assinatura
        formData.append('cpf', cpf); // Anexa o CPF para associar

        // Envia os dados para o seu webhook
        fetch('URL_DO_SEU_WEBHOOK', {
            method: 'POST',
            body: formData,
        }).then(response => {
            if (response.ok) {
                alert('Assinatura associada com sucesso!');
            }
        });
    }

    // Função para validar o CPF (somente números)
    function validateCPF() {
        const cpfField = document.getElementById('cpf');
        cpfField.value = cpfField.value.replace(/[^0-9]/g, ''); // Remove qualquer caractere não numérico
    }
</script>

</body>
</html>
